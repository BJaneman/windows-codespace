name: High-Speed Windows 10 LTSC (RDP Only)

on:
  workflow_dispatch: # Allows you to trigger the workflow manually from the Actions tab

jobs:
  run-windows-rdp:
    runs-on: ubuntu-latest
    steps:
      - name: Verify KVM Support
        run: |
          echo "Checking for Hardware Virtualization Support..."
          sudo apt-get update && sudo apt-get install -y qemu-kvm
          ls -l /dev/kvm || echo "KVM not available, falling back to software emulation."

      - name: Start Windows 10 LTSC Container
        run: |
          # Exposing only 3389 for native RDP. 
          # Dropped the 8006 browser port entirely to ensure Ngrok stays within free limits.
          docker run -d \
            --name windows \
            --device=/dev/kvm \
            --cap-add NET_ADMIN \
            -p 3389:3389 \
            -e VERSION="ltsc10" \
            -e RAM_SIZE="5G" \
            -e CPU_CORES="2" \
            dockurr/windows

      - name: Setup Ngrok Tunnel (RDP Only)
        env:
          NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
        run: |
          echo "Installing Ngrok..."
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb [signed-by=/etc/apt/trusted.gpg.d/ngrok.asc] https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update && sudo apt-get install ngrok
          
          echo "Starting Ngrok TCP Tunnel for RDP..."
          # Starting only a single TCP tunnel to stay within free-tier limits
          ngrok tcp 3389 --authtoken $NGROK_AUTHTOKEN --log=stdout > ngrok.log 2>&1 &
          
          # Give Ngrok a few seconds to establish the connection
          sleep 10
          
          echo "========================================================"
          echo "⚡ NATIVE RDP ADDRESS FOR REMOTE DESKTOP APP:"
          RDP_URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url' | sed 's/tcp:\/\///')
          
          if [ -z "$RDP_URL" ] || [ "$RDP_URL" == "null" ]; then
            echo "❌ ERROR: Ngrok failed to start. Printing error log:"
            cat ngrok.log
          else
            echo "$RDP_URL"
            echo ""
            echo "👤 Username: docker"
            echo "🔑 Password: (Leave blank / press Enter)"
          fi
          echo "========================================================"

      - name: Monitor Installation and System Logs
        run: |
          echo "Tailing Dockur logs. Windows installation takes roughly 15-20 minutes."
          echo "Keep this window open to keep the GitHub Actions runner alive (Max limit: 6 hours)."
          docker logs -f windows
