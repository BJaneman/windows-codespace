name: Windows 10 LTSC via Dockur

on:
  workflow_dispatch:

jobs:
  run-windows-container:
    runs-on: ubuntu-latest
    steps:
      - name: Verify KVM Support
        run: |
          echo "Checking for Hardware Virtualization Support..."
          sudo apt-get update && sudo apt-get install -y qemu-kvm
          ls -l /dev/kvm || echo "KVM not available, falling back to software emulation."

      - name: Start Windows 10 LTSC Container
        run: |
          docker run -d \
            --name windows \
            --device=/dev/kvm \
            --cap-add NET_ADMIN \
            -p 8006:8006 \
            -p 3389:3389 \
            -e VERSION="ltsc10" \
            -e RAM_SIZE="4G" \
            -e CPU_CORES="2" \
            dockurr/windows

      - name: Setup Ngrok Tunnels (Browser & RDP)
        env:
          NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
        run: |
          echo "Installing Ngrok..."
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb [signed-by=/etc/apt/trusted.gpg.d/ngrok.asc] https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update && sudo apt-get install ngrok
          
          echo "Creating Ngrok configuration for multi-tunneling..."
          cat <<EOF > ngrok.yml
          authtoken: $NGROK_AUTHTOKEN
          tunnels:
            novnc:
              proto: http
              addr: 8006
            rdp:
              proto: tcp
              addr: 3389
          EOF
          
          echo "Starting Ngrok Tunnels..."
          ngrok start --all --config ngrok.yml > ngrok.log 2>&1 &
          
          # Give Ngrok a few seconds to establish connections
          sleep 10
          
          # Extract the public endpoints using the local Ngrok API agent
          echo "========================================================"
          echo "🌐 BROWSER (noVNC) URL:"
          curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[] | select(.name=="novnc") | .public_url'
          echo "========================================================"
          echo "⚡ NATIVE RDP ADDRESS FOR REMOTE DESKTOP APP:"
          curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[] | select(.name=="rdp") | .public_url' | sed 's/tcp:\/\///'
          echo "========================================================"

      - name: Monitor Installation and System Logs
        run: |
          echo "Tailing Dockur logs. Windows installation takes roughly 15-20 minutes."
          docker logs -f windows
