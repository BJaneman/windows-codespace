name: High-Speed Windows 10 LTSC (RDP Only)

on:
  workflow_dispatch:

jobs:
  run-windows-rdp:
    runs-on: ubuntu-latest
    steps:
      - name: Verify KVM Support
        run: |
          echo "Checking for Hardware Virtualization Support..."
          sudo apt-get update && sudo apt-get install -y qemu-kvm
          ls -l /dev/kvm || echo "KVM not available, falling back to software emulation."

      - name: Start Windows 10 LTSC Container
        run: |
          docker run -d \
            --name windows \
            --device=/dev/kvm \
            --cap-add NET_ADMIN \
            -p 3389:3389 \
            -e VERSION="ltsc10" \
            -e RAM_SIZE="5G" \
            -e CPU_CORES="2" \
            dockurr/windows

      - name: Setup Bore Tunnel (RDP - No Account Required)
        run: |
          echo "Downloading Bore..."
          wget -q https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          tar -xf bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          chmod +x bore
          
          echo "Starting Bore TCP Tunnel for RDP..."
          # Tunneling port 3389 to the public bore.pub server
          ./bore local 3389 --to bore.pub > bore.log 2>&1 &
          
          # Give Bore a few seconds to connect
          sleep 5
          
          echo "========================================================"
          echo "⚡ NATIVE RDP ADDRESS FOR REMOTE DESKTOP APP:"
          
          # Extracting the dynamic port assigned by bore.pub
          BORE_PORT=$(cat bore.log | grep -o 'listening at bore.pub:[0-9]*' | awk -F':' '{print $2}')
          
          if [ -z "$BORE_PORT" ]; then
            echo "❌ ERROR: Bore failed to start. Printing error log:"
            cat bore.log
          else
            echo "bore.pub:$BORE_PORT"
            echo ""
            echo "👤 Username: docker"
            echo "🔑 Password: (Leave blank / press Enter)"
          fi
          echo "========================================================"

      - name: Monitor Installation and System Logs
        run: |
          echo "Tailing Dockur logs. Windows installation takes roughly 15-20 minutes."
          echo "Keep this window open to keep the GitHub Actions runner alive."
          docker logs -f windows
